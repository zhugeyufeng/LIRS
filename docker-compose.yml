services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lirs
      POSTGRES_USER: lirs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lirs -d lirs"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}

  backup:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    command: >
      sh -c 'mkdir -p /backups &&
      while true; do
        pg_dump -h postgres -U lirs -d lirs > /backups/lirs-$$(date +%Y%m%d-%H%M%S).sql;
        find /backups -type f -name "lirs-*.sql" -mtime +14 -delete;
        sleep 86400;
      done'
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://lirs:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/lirs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      INITIAL_ADMIN_EMAIL: admin@lirs.local
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD in .env}
      INITIAL_ADMIN_NAME: 系统初始管理员
      INITIAL_DEMO_USER_PASSWORD: ${INITIAL_DEMO_USER_PASSWORD:?set INITIAL_DEMO_USER_PASSWORD in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  hono:
    build:
      context: .
      dockerfile: apps/hono/Dockerfile
    environment:
      PORT: "8090"
      DATABASE_URL: postgres://lirs:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/lirs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      GO_API_BASE_URL: http://api:8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    environment:
      HOSTNAME: 0.0.0.0
      API_BASE_URL: http://hono:8090
      NEXT_PUBLIC_API_BASE_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - hono

volumes:
  postgres-data:
  redis-data:
  postgres-backups:
